<div class="voter-list-settings">
  <bc-table [dataSource]="domainOfInfluences">
    <ng-container columnDef="name">
      <th bc-header-cell *headerCellDef>{{ 'DOMAIN_OF_INFLUENCE.NAME' | translate }}</th>
      <td bc-data-cell *dataCellDef="let doi">{{ doi.name }}</td>
    </ng-container>

    <ng-container columnDef="allowManualVoterListUpload">
      <th bc-header-cell *headerCellDef>{{ 'STEP_CONTEST_OVERVIEW.DOMAIN_OF_INFLUENCE_ALLOW_MANUAL_VOTER_LIST_UPLOAD' | translate }}</th>
      <td bc-data-cell *dataCellDef="let doi">
        <bc-checkbox
          [checked]="doi.allowManualVoterListUpload"
          (checkedChange)="setAllowManualVoterListUpload(doi, $event)"
          [disabled]="saving"
          subscriptSizing="dynamic"
        ></bc-checkbox>
      </td>
    </ng-container>

    <tr bc-header-row *headerRowDef="let row; columns: columns"></tr>
    <tr bc-data-row *dataRowDef="let row; columns: columns; let i = index"></tr>
  </bc-table>

  @if (domainOfInfluences.length === 0) {
    <p class="italic ml-2" translate>APP.NO_DATA</p>
  }
</div>
