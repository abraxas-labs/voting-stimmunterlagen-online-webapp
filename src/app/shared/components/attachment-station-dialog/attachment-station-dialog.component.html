<vo-lib-dialog [header]="'ATTACHMENT.SET_STATION_TITLE' | translate" (dialogClose)="done()">
  <div content class="m-2">
    <form #form="ngForm">
      <bc-text
        [label]="'ATTACHMENT.NAME' | translate"
        [disabled]="true"
        name="name"
        [ngModel]="data.attachment.name"
        [subscriptSizing]="'dynamic'"
      ></bc-text>

      <bc-number
        [label]="'ATTACHMENT.STATION' | translate"
        name="station"
        [required]="true"
        [(ngModel)]="station"
        [min]="1"
        [max]="99"
        [subscriptSizing]="'dynamic'"
      ></bc-number>
    </form>
  </div>

  <app-button-bar
    footer
    [saving]="saving"
    [canSave]="!!form.valid && !isReservedStation"
    [hasDeleteButton]="false"
    (save)="save()"
    (cancelEvent)="done()"
  >
  </app-button-bar>
</vo-lib-dialog>
