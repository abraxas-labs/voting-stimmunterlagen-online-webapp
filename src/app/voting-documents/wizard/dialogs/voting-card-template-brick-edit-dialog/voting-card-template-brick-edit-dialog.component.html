<vo-lib-dialog
  [header]="'STEP_LAYOUT_VOTING_CARDS_POLITICAL_BUSINESS_ATTENDEE.EDIT_SINGLE_TEMPLATE_DATA' | translate: brick"
  (dialogClose)="close()"
>
  <div content class="m-2">
    @if (!!brickEditSrc) {
      <iframe #editorIframe [src]="brickEditSrc"></iframe>
    }

    @if (loading) {
      <bc-spinner></bc-spinner>
    }
  </div>

  <app-button-bar footer [saving]="saving" [hasDeleteButton]="false" (save)="save()" (cancelEvent)="close()"> </app-button-bar>
</vo-lib-dialog>
