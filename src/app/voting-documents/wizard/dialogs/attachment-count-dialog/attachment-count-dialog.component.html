<vo-lib-dialog [header]="'ATTACHMENT.SET_REQUIRED_COUNT_TITLE' | translate" (dialogClose)="done()">
  <div content class="m-2">
    <form #form="ngForm">
      <bc-text
        [label]="'ATTACHMENT.NAME' | translate"
        [disabled]="true"
        name="name"
        [ngModel]="data.attachment.name"
        [subscriptSizing]="'dynamic'"
      ></bc-text>

      <bc-number
        [label]="'ATTACHMENT.REQUIRED_COUNT' | translate"
        [min]="0"
        name="requiredCount"
        [required]="true"
        [(ngModel)]="count"
        [subscriptSizing]="'dynamic'"
      ></bc-number>
    </form>
  </div>

  <app-button-bar
    footer
    [saving]="saving"
    [canSave]="!!form.valid"
    [hasDeleteButton]="false"
    (save)="save()"
    (cancelEvent)="done()"
  ></app-button-bar>
</vo-lib-dialog>
